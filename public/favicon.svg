  </defs>
  <!-- Front face of 3D M at three-quarter perspective -->
  <polygon points="8,56 8,14 18,8 28,36 32,24 42,8 52,14 52,56 42,52 42,28 34,48 26,48 18,28 18,52" fill="url(#face)"/>
  <!-- Right side depth -->
