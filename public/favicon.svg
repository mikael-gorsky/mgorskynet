  <polygon points="42,52 48,54 48,28 42,28" fill="url(#side)" opacity="0.6"/>
  <!-- Top edges -->
  <polygon points="8,14 14,10 24,4 18,8" fill="url(#top)"/>
  <polygon points="42,8 48,4 58,18 52,14" fill="url(#top)"/>
  <polygon points="18,8 24,4 34,20 28,36" fill="url(#top)" opacity="0.7"/>
  <polygon points="32,24 38,20 48,4 42,8" fill="url(#top)" opacity="0.7"/>
  <!-- Bottom depth -->
  <polygon points="8,56 14,58 18,54 18,52" fill="url(#side)" opacity="0.5"/>
  <polygon points="52,56 58,58 48,54 42,52" fill="url(#side)" opacity="0.5"/>
</svg>
